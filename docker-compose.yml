version: '3.8'

services:
  chapi-integration:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chapi-integration
    ports:
      - "8080:8080"
    environment:
      - SPRING_APPLICATION_NAME=chapi-integration
      - SERVER_PORT=8080
      - JAVA_OPTS=-Xmx512m -Xms256m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - chapi-network

networks:
  chapi-network:
    driver: bridge
