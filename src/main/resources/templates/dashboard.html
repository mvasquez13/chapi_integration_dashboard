<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${dashboard.title}">Chapi Integration Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            color: #333;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .status-badge {
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85em;
        }

        .status-healthy {
            background: #10b981;
            color: white;
        }

        .status-warning {
            background: #f59e0b;
            color: white;
        }

        .status-critical {
            background: #ef4444;
            color: white;
        }

        .last-update {
            color: #666;
            font-size: 0.9em;
        }

        .indicators-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .indicator-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .indicator-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .indicator-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .indicator-name {
            font-size: 0.9em;
            color: #666;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .trend {
            font-size: 1.2em;
        }

        .trend.up {
            color: #10b981;
        }

        .trend.down {
            color: #ef4444;
        }

        .trend.stable {
            color: #6b7280;
        }

        .indicator-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .indicator-unit {
            font-size: 0.85em;
            color: #999;
        }

        .category-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 0.75em;
            margin-top: 10px;
            font-weight: 500;
        }

        .category-performance {
            background: #dbeafe;
            color: #1e40af;
        }

        .category-business {
            background: #dcfce7;
            color: #166534;
        }

        .category-reliability {
            background: #fef3c7;
            color: #92400e;
        }

        .refresh-btn {
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .refresh-btn:hover {
            background: #667eea;
            color: white;
        }

        @media (max-width: 768px) {
            .indicators-grid {
                grid-template-columns: 1fr;
            }

            .header-info {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 th:text="${dashboard.title}">Chapi Integration Dashboard</h1>
            <div class="header-info">
                <div>
                    <span th:class="'status-badge status-' + ${dashboard.status}" 
                          th:text="${dashboard.status}">Status</span>
                    <button class="refresh-btn" onclick="location.reload()">🔄 Refresh</button>
                </div>
                <div class="last-update">
                    <span>Last Update: </span>
                    <span th:text="${#temporals.format(dashboard.lastUpdate, 'dd/MM/yyyy HH:mm:ss')}"></span>
                </div>
            </div>
        </div>

        <div class="indicators-grid">
            <div class="indicator-card" th:each="indicator : ${dashboard.indicators}">
                <div class="indicator-header">
                    <span class="indicator-name" th:text="${indicator.name}">Indicator Name</span>
                    <span th:class="'trend ' + ${indicator.trend}">
                        <span th:if="${indicator.trend == 'up'}">↑</span>
                        <span th:if="${indicator.trend == 'down'}">↓</span>
                        <span th:if="${indicator.trend == 'stable'}">→</span>
                    </span>
                </div>
                <div>
                    <span class="indicator-value" th:text="${indicator.value}">0</span>
                    <span class="indicator-unit" th:text="${indicator.unit}">unit</span>
                </div>
                <span th:class="'category-badge category-' + ${indicator.category}" 
                      th:text="${indicator.category}">Category</span>
            </div>
        </div>
    </div>

    <script>
        // Auto-refresh cada 30 segundos
        setTimeout(function() {
            location.reload();
        }, 30000);
    </script>
</body>
</html>
