version: '3.8'

services:
  sonar-scanner:
    image: maven:3.9-eclipse-temurin-21
    container_name: chapi-sonar-scanner
    working_dir: /app
    volumes:
      - .:/app
      - maven-cache:/root/.m2
    environment:
      - SONAR_TOKEN=${SONAR_TOKEN}
      - SONAR_HOST_URL=https://sonarcloud.io
      - SONAR_ORGANIZATION=marco-vasquez-l
      - SONAR_PROJECT_KEY=chapi-integration
    command: >
      sh -c "
      echo '🔍 Iniciando análisis de SonarCloud...' &&
      echo '' &&
      echo '📦 Compilando proyecto y ejecutando tests...' &&
      mvn clean verify &&
      echo '' &&
      echo '🚀 Ejecutando análisis de SonarCloud...' &&
      mvn sonar:sonar \
        -Dsonar.projectKey=chapi-integration \
        -Dsonar.organization=marco-vasquez-l \
        -Dsonar.host.url=https://sonarcloud.io \
        -Dsonar.token=$SONAR_TOKEN &&
      echo '' &&
      echo '✅ Análisis completado exitosamente!' &&
      echo '🌐 Revisa los resultados en: https://sonarcloud.io/dashboard?id=chapi-integration'
      "
    networks:
      - sonar-network

volumes:
  maven-cache:
    driver: local

networks:
  sonar-network:
    driver: bridge
